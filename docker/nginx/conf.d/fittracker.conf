# ============================================================
# Server bloc FitTracker
# - Reverse-proxy vers l'app Spring Boot sur app:8080
# - Headers de securite (HSTS prepare pour HTTPS phase 6)
# - Route /ws/** pour upgrade WebSocket (phase 5)
# - /health = endpoint local Nginx pour son propre healthcheck Docker
# ============================================================

server {
    listen 80 default_server;
    server_name _;

    # ---- Headers de securite (s'appliquent a toutes les reponses) ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;
    # CSP basique : raffinee si une UI est servie via Nginx (cf. notifications phase 5)
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    # HSTS : aucune action en HTTP, sera effectif des l'ouverture du :443 en phase 6
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- Health Nginx local (consomme par le healthcheck Docker) ----
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ---- WebSocket : upgrade obligatoire ----
    location /ws/ {
        proxy_pass http://fittracker_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # ---- Reverse-proxy par defaut (REST + Swagger + actuator) ----
    location / {
        proxy_pass http://fittracker_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
