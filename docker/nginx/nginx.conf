# ============================================================
# FitTracker - configuration Nginx (reverse-proxy)
# Termine HTTP (phase 2). TLS sera ajoute en phase 6 via un certificat
# self-signed pour la demo et documentation de la rotation.
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ---- Logs structures ----
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"referer":"$http_referer",'
            '"user_agent":"$http_user_agent",'
            '"forwarded_for":"$http_x_forwarded_for",'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time"'
        '}';
    access_log /var/log/nginx/access.log json_combined;

    # ---- Performance ----
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 10m;

    # ---- Gzip ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        application/xml
        application/problem+json
        text/css
        text/plain
        text/xml
        image/svg+xml;

    # ---- Upstream Spring Boot ----
    upstream fittracker_app {
        server app:8080;
        keepalive 32;
    }

    # ---- Map pour WebSocket upgrade ----
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    include /etc/nginx/conf.d/*.conf;
}
