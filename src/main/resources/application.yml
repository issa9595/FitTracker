# ============================================================
# FitTracker - configuration par defaut (profil 'dev' / 'default').
# 12-Factor III : config externalisee via env vars (placeholders ${VAR:default}).
# Aucun secret en clair : les defauts sont des valeurs locales sans risque.
# Voir application-prod.yml pour les surcharges prod et .env.example pour la liste.
# ============================================================

spring:
  application:
    name: ${APP_NAME:fittracker}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ---- Datasource (PostgreSQL) ----
  # Active a partir de la phase 4 quand JPA sera ajoute. Les placeholders sont
  # presents des maintenant pour valider l'externalisation (12-Factor III).
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fittracker}
    username: ${SPRING_DATASOURCE_USERNAME:fittracker}
    password: ${SPRING_DATASOURCE_PASSWORD:fittracker}

  # ---- JPA / Hibernate (Phase 4) ----
  # Flyway gere le schema : ddl-auto reste a 'validate' (jamais 'update', cf. brief 6.6).
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false           # anti-pattern : pas de session ouverte cote MVC
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
        jdbc:
          time_zone: UTC
    show-sql: ${HIBERNATE_SHOW_SQL:false}

  # ---- Flyway (migrations versionnees) ----
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  # ---- Redis ----
  # Active a partir de la phase 5. Placeholders documentes.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2000}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework   # respecter X-Forwarded-* de nginx
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_EXPOSE:health,info}
  endpoint:
    health:
      show-details: ${ACTUATOR_HEALTH_DETAILS:never}
      probes:
        enabled: true
  info:
    env:
      enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}

info:
  app:
    name: ${spring.application.name}
    version: ${APP_VERSION:0.1.0-SNAPSHOT}
    profile: ${spring.profiles.active}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.fittracker: ${LOG_LEVEL_APP:INFO}
    org.springframework: ${LOG_LEVEL_SPRING:INFO}
  file:
    path: ${LOG_FILE_PATH:./logs}

# CORS (consomme par SecurityConfig en phase 6, declare ici en placeholder)
fittracker:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  security:
    jwt:
      issuer: ${JWT_ISSUER:fittracker}
      # Secret HS256 (>= 32 octets). Defaut dev uniquement ; surcharger via JWT_SECRET en prod.
      secret: ${JWT_SECRET:dev-fittracker-hs256-secret-change-me-please-0123456789abcdef}
      access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL:900}
      refresh-token-ttl-seconds: ${JWT_REFRESH_TOKEN_TTL:604800}
  logging:
    file-enabled: ${LOG_FILE_ENABLED:false}
