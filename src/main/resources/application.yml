spring:
  application:
    name: ${APP_NAME:fittracker}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_EXPOSE:health,info}
  endpoint:
    health:
      show-details: ${ACTUATOR_HEALTH_DETAILS:never}
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: ${APP_VERSION:0.1.0-SNAPSHOT}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.fittracker: ${LOG_LEVEL_APP:INFO}
