name: Release

# Declenche sur un tag de version (ex. v0.1.0 pousse sur main apres merge).
on:
  push:
    tags: ['v*']

permissions:
  contents: write # creer la GitHub Release
  packages: write # pousser l'image sur GHCR

jobs:
  release:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/issa9595/fittracker:${{ github.ref_name }}
            ghcr.io/issa9595/fittracker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release (notes auto)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
