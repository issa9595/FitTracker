name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Spotless + Checkstyle)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Spotless check
        run: ./mvnw -B spotless:check

      - name: Checkstyle
        run: ./mvnw -B checkstyle:check

  build:
    name: Build & unit tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        java: [21]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Maven verify (skip integration tests)
        run: ./mvnw -B verify -DskipITs

      - name: Upload build artefact (jar)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: fittracker-jar-java-${{ matrix.java }}
          path: target/fittracker.jar
          retention-days: 7
          if-no-files-found: warn

  docker-build:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: fittracker:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect image size
        run: |
          docker image ls fittracker:ci-${{ github.sha }}
          SIZE_BYTES=$(docker image inspect fittracker:ci-${{ github.sha }} --format='{{.Size}}')
          SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
          echo "Image size: ${SIZE_MB} MB"
          if [ "$SIZE_MB" -gt 250 ]; then
            echo "::warning::Image FitTracker depasse 250 Mo (${SIZE_MB} Mo). Cible : <250 Mo."
          fi

      - name: Smoke test - run container & curl actuator/health
        run: |
          docker run -d --name ft -p 8080:8080 fittracker:ci-${{ github.sha }}
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/actuator/health >/dev/null 2>&1; then
              echo "Container repond sur /actuator/health"
              curl -s http://localhost:8080/actuator/health
              docker logs ft | tail -20
              docker rm -f ft
              exit 0
            fi
            sleep 2
          done
          echo "Container n'a pas repondu apres 60s"
          docker logs ft
          docker rm -f ft
          exit 1
