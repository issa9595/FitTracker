name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Spotless + Checkstyle)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Spotless check
        run: ./mvnw -B spotless:check

      - name: Checkstyle
        run: ./mvnw -B checkstyle:check

  build:
    name: Build & unit tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        java: [21]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      # Docker est disponible sur ubuntu-latest : les tests (unitaires + integration
      # Testcontainers via jdbc:tc:postgresql) s'executent tous ici.
      - name: Maven verify (unit + integration tests Testcontainers)
        run: ./mvnw -B verify

      # Couverture JaCoCo (fusion unit + IT) publiee en artefact, meme si la regle
      # de couverture echoue, pour pouvoir diagnostiquer la ou ca coince.
      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-java-${{ matrix.java }}
          path: target/site/jacoco/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload build artefact (jar)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: fittracker-jar-java-${{ matrix.java }}
          path: target/fittracker.jar
          retention-days: 7
          if-no-files-found: warn

  docker-build:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: fittracker:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect image size
        run: |
          docker image ls fittracker:ci-${{ github.sha }}
          SIZE_BYTES=$(docker image inspect fittracker:ci-${{ github.sha }} --format='{{.Size}}')
          # On utilise des MB decimaux (1 MB = 1 000 000 octets) pour rester aligne avec 'docker image ls'.
          SIZE_MB=$((SIZE_BYTES / 1000 / 1000))
          SIZE_MIB=$((SIZE_BYTES / 1024 / 1024))
          echo "Image size: ${SIZE_MB} MB (${SIZE_MIB} MiB)"
          if [ "$SIZE_MB" -gt 250 ]; then
            echo "::error::Image FitTracker depasse 250 Mo (${SIZE_MB} Mo). Cible imposee par le brief : <250 Mo."
            exit 1
          fi

      - name: Smoke test - run container & curl actuator/health
        run: |
          # Depuis la Phase 4, l'app exige une datasource (JPA + Flyway). On fournit donc
          # un Postgres jetable sur un reseau dedie ; l'image tourne en profil prod
          # (defaut du Dockerfile) avec les vars d'env imposees par application-prod.yml.
          docker network create ftnet
          docker run -d --name ft-db --network ftnet \
            -e POSTGRES_DB=fittracker \
            -e POSTGRES_USER=fittracker \
            -e POSTGRES_PASSWORD=ci-only-not-a-secret \
            postgres:16-alpine
          echo "Attente que Postgres soit pret..."
          for i in $(seq 1 30); do
            docker exec ft-db pg_isready -U fittracker -d fittracker >/dev/null 2>&1 && break
            sleep 2
          done
          docker run -d --name ft --network ftnet -p 8080:8080 \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://ft-db:5432/fittracker \
            -e SPRING_DATASOURCE_USERNAME=fittracker \
            -e SPRING_DATASOURCE_PASSWORD=ci-only-not-a-secret \
            fittracker:ci-${{ github.sha }}
          ok=0
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/actuator/health >/dev/null 2>&1; then
              echo "Container repond sur /actuator/health"
              curl -s http://localhost:8080/actuator/health
              ok=1
              break
            fi
            sleep 2
          done
          [ "$ok" -eq 1 ] || echo "Container n'a pas repondu apres 60s"
          docker logs ft | tail -30
          docker rm -f ft ft-db >/dev/null 2>&1 || true
          docker network rm ftnet >/dev/null 2>&1 || true
          [ "$ok" -eq 1 ] || exit 1

  compose-validate:
    name: Docker Compose stack (app + db + redis + nginx)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Boot stack with prod profile (no dev override)
        run: |
          cp .env.example .env
          {
            echo "SPRING_PROFILES_ACTIVE=prod"
            echo "POSTGRES_PASSWORD=ci-only-not-a-secret"
            echo "SPRING_DATASOURCE_PASSWORD=ci-only-not-a-secret"
          } >> .env
          docker compose -f docker-compose.yml up -d --build

      - name: Wait up to 180s for all services healthy
        run: |
          set +e
          DEADLINE=$(( $(date +%s) + 180 ))
          while [ $(date +%s) -lt $DEADLINE ]; do
            all_healthy=true
            for svc in app db redis nginx; do
              status=$(docker inspect --format='{{.State.Health.Status}}' fittracker-$svc-1 2>/dev/null || echo "missing")
              if [ "$status" != "healthy" ]; then
                all_healthy=false
                break
              fi
            done
            if $all_healthy; then
              echo "All services healthy."
              exit 0
            fi
            sleep 5
          done
          echo "::warning::Timeout reached, some services not healthy."

      - name: List services and statuses
        if: always()
        run: docker compose ps

      - name: Diagnose unhealthy services
        if: always()
        run: |
          for svc in app db redis nginx; do
            status=$(docker inspect --format='{{.State.Health.Status}}' fittracker-$svc-1 2>/dev/null || echo "missing")
            echo "==== Service $svc: $status ===="
            if [ "$status" != "healthy" ]; then
              echo "---- Healthcheck JSON (exit codes + output) ----"
              docker inspect fittracker-$svc-1 --format='{{json .State.Health}}' 2>/dev/null | jq '.Log[-5:]' 2>/dev/null || docker inspect fittracker-$svc-1 --format='{{json .State.Health}}' 2>/dev/null || true
              echo "---- Container logs (last 100 lines) ----"
              docker compose logs --tail=100 $svc 2>&1 || true
              echo "---- Image inspect (basic) ----"
              docker compose exec -T $svc sh -c "which wget; wget --help 2>&1 | head -3" || true
            fi
          done

      - name: Fail if any service unhealthy
        run: |
          set -e
          for svc in app db redis nginx; do
            status=$(docker inspect --format='{{.State.Health.Status}}' fittracker-$svc-1 2>/dev/null || echo "missing")
            if [ "$status" != "healthy" ]; then
              echo "::error::Service $svc is $status"
              exit 1
            fi
          done

      - name: Hit /actuator/health via nginx
        run: |
          curl -fsS http://localhost/actuator/health
          echo
          curl -fsS http://localhost/actuator/health | grep -q '"status":"UP"'

      - name: Verify security headers on nginx
        run: |
          headers=$(curl -fsSI http://localhost/actuator/health)
          echo "$headers"
          echo "$headers" | grep -i "x-content-type-options: nosniff"
          echo "$headers" | grep -i "x-frame-options: DENY"
          echo "$headers" | grep -i "referrer-policy"
          echo "$headers" | grep -i "content-security-policy"

      - name: Verify prod logs are valid JSON (12-Factor XI)
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          docker compose logs app --no-log-prefix --no-color > /tmp/app.log
          tail -40 /tmp/app.log
          # On filtre les lignes commencant par { (le banner Spring Boot prefixe via Logback
          # peut s'eparpiller sur plusieurs lignes), puis on tente de parser chacune en JSON.
          json_count=$(grep -E '^\{' /tmp/app.log | wc -l | tr -d ' ')
          echo "Lignes JSON detectees : $json_count"
          if [ "$json_count" -lt 1 ]; then
            echo "::error::Aucune ligne JSON dans les logs prod. La config Logback prod ne semble pas active."
            exit 1
          fi
          # Verifie qu'au moins une ligne contient les champs attendus (message + level + @timestamp)
          grep -E '^\{' /tmp/app.log | head -10 | jq -e 'select(.message != null and .level != null and ."@timestamp" != null) | .message' | head -1

      - name: Tear down
        if: always()
        run: docker compose down -v
